<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c63ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6c63ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#g1)"/>

  <!-- Glow orbs -->
  <ellipse cx="200" cy="180" rx="300" ry="300" fill="url(#glow1)"/>
  <ellipse cx="950" cy="480" rx="250" ry="250" fill="url(#glow2)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Badge -->
  <rect x="80" y="72" width="220" height="36" rx="18" fill="rgba(108,99,255,0.2)" stroke="rgba(108,99,255,0.5)" stroke-width="1"/>
  <text x="190" y="96" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="1">🧪 БЕТА · ОТКРЫТЫЙ ДОСТУП</text>

  <!-- Main heading -->
  <text x="80" y="200" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="76" font-weight="900" fill="#ffffff" letter-spacing="-2">Квизы,</text>
  <text x="80" y="290" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="76" font-weight="900" fill="#a78bfa" letter-spacing="-2">которые захватывают</text>

  <!-- Subtext -->
  <text x="80" y="355" font-family="-apple-system,sans-serif" font-size="24" fill="rgba(255,255,255,0.55)">Тематические паки · Онлайн-турниры · Дуэли с друзьями</text>

  <!-- Pills -->
  <rect x="80" y="395" width="170" height="44" rx="12" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="165" y="423" font-family="-apple-system,sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.75)" text-anchor="middle">🎮 Тематические паки</text>

  <rect x="265" y="395" width="155" height="44" rx="12" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="342" y="423" font-family="-apple-system,sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.75)" text-anchor="middle">🏆 Турниры</text>

  <rect x="435" y="395" width="130" height="44" rx="12" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="500" y="423" font-family="-apple-system,sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.75)" text-anchor="middle">⚔️ Дуэли</text>

  <rect x="580" y="395" width="120" height="44" rx="12" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="640" y="423" font-family="-apple-system,sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.75)" text-anchor="middle">⚡ Бесплатно</text>

  <!-- Mock phone card -->
  <rect x="870" y="80" width="260" height="440" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="890" y="110" width="220" height="32" rx="8" fill="rgba(108,99,255,0.2)"/>
  <text x="1000" y="131" font-family="sans-serif" font-size="11" font-weight="800" fill="#a78bfa" text-anchor="middle" letter-spacing="1">🏆 ЖИВОЙ ТУРНИР</text>

  <!-- Leaderboard rows -->
  <rect x="890" y="155" width="220" height="36" rx="8" fill="rgba(255,255,255,0.06)"/>
  <text x="906" y="178" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">🥇 Катя М.</text>
  <text x="1094" y="178" font-family="sans-serif" font-size="13" font-weight="700" fill="#f0c040" text-anchor="end">340</text>

  <rect x="890" y="198" width="220" height="36" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="906" y="221" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">🥈 Дима Р.</text>
  <text x="1094" y="221" font-family="sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="end">290</text>

  <rect x="890" y="241" width="220" height="36" rx="8" fill="rgba(108,99,255,0.2)" stroke="rgba(108,99,255,0.4)" stroke-width="1"/>
  <text x="906" y="264" font-family="sans-serif" font-size="13" font-weight="800" fill="#ffffff">🎯 Ты  #3</text>
  <text x="1094" y="264" font-family="sans-serif" font-size="13" font-weight="800" fill="#a78bfa" text-anchor="end">265</text>

  <rect x="890" y="284" width="220" height="36" rx="8" fill="rgba(255,255,255,0.03)"/>
  <text x="906" y="307" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">4. Маша К.</text>
  <text x="1094" y="307" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="end">220</text>

  <text x="1000" y="365" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">Осталось 2 вопроса</text>

  <!-- URL bottom -->
  <text x="80" y="575" font-family="-apple-system,sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.3)">brain-fight-club.vercel.app</text>

  <!-- Logo top right -->
  <text x="1120" y="50" font-family="-apple-system,sans-serif" font-size="18" font-weight="900" fill="#a78bfa" text-anchor="end">🧠 BFC</text>
</svg>
