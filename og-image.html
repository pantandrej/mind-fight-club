<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#0d0d1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.bg-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(108,99,255,.25) 0%,transparent 70%);top:-100px;left:-100px}
.bg-glow2{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.15) 0%,transparent 70%);bottom:-50px;right:100px}
.inner{position:relative;z-index:1;padding:60px 80px;width:100%}
.badge{display:inline-block;background:rgba(108,99,255,.2);border:1px solid rgba(108,99,255,.4);border-radius:20px;padding:6px 16px;font-size:14px;font-weight:700;color:#a78bfa;letter-spacing:.5px;margin-bottom:28px}
h1{font-size:72px;font-weight:900;color:#fff;line-height:1.0;letter-spacing:-2px;margin-bottom:20px}
h1 span{color:#a78bfa}
p{font-size:24px;color:rgba(255,255,255,.5);margin-bottom:48px;line-height:1.4;max-width:600px}
.pills{display:flex;gap:12px;flex-wrap:wrap}
.pill{background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.12);border-radius:12px;padding:10px 18px;font-size:16px;font-weight:700;color:rgba(255,255,255,.7)}
.logo{position:absolute;top:48px;right:80px;font-size:20px;font-weight:900;color:#a78bfa;letter-spacing:-.5px}
.url{position:absolute;bottom:48px;right:80px;font-size:14px;color:rgba(255,255,255,.3);font-weight:600}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>
<div class="inner">
  <div class="badge">🧪 Бета · Открытый доступ</div>
  <h1>Квизы,<br>которые <span>захватывают</span></h1>
  <p>Тематические паки, живые турниры и дуэли с друзьями</p>
  <div class="pills">
    <div class="pill">🎮 Тематические паки</div>
    <div class="pill">🏆 Онлайн-турниры</div>
    <div class="pill">⚔️ Дуэли</div>
    <div class="pill">⚡ Бесплатно</div>
  </div>
</div>
<div class="logo">🧠 BFC</div>
<div class="url">brain-fight-club.vercel.app</div>
</body>
</html>
